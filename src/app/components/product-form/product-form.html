<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-body">
          <h2 class="text-center mb-4">{{ isEditMode ? 'Edit Product' : 'Add New Product' }}</h2>
          <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Product Name</label>
              <input type="text" class="form-control" formControlName="name">
            </div>
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea class="form-control" formControlName="description"></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label">Price</label>
              <input type="number" class="form-control" formControlName="price">
            </div>
            <div class="mb-3">
              <label class="form-label">Category</label>
              <select class="form-select" formControlName="category">
                <option value="" disabled>Select a category</option>
                <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">Image URL</label>
              <input type="text" class="form-control" formControlName="image">
            </div>
            <div class="mb-3">
              <label class="form-label">Available Quantity</label>
              <input type="number" class="form-control" formControlName="available_quantity">
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary flex-grow-1" [disabled]="productForm.invalid">Save Product</button>
              <button type="button" class="btn btn-secondary" routerLink="/products">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
