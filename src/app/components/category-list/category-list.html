<div class="container mt-4">
  <h2>Category Management</h2>
  <div class="row">
    <div class="col-md-4">
      <div class="card shadow-sm">
        <div class="card-body">
          <h5>{{ isEditMode ? 'Edit Category' : 'Add New Category' }}</h5>
          <form [formGroup]="categoryForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label">Category Name</label>
              <input type="text" class="form-control" formControlName="name">
            </div>
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea class="form-control" formControlName="description"></textarea>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary flex-grow-1" [disabled]="categoryForm.invalid">
                {{ isEditMode ? 'Update' : 'Add' }}
              </button>
              <button type="button" class="btn btn-secondary" *ngIf="isEditMode" (click)="resetForm()">Cancel</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <table class="table table-hover">
            <thead>
              <tr>
                <th>Name</th>
                <th>Description</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let cat of categories">
                <td>{{ cat.name }}</td>
                <td>{{ cat.description }}</td>
                <td>
                  <button class="btn btn-sm btn-outline-warning me-2" (click)="editCategory(cat)">Edit</button>
                  <button class="btn btn-sm btn-outline-danger" (click)="deleteCategory(cat.id)">Delete</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
