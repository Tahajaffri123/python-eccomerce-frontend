<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Products</h2>
    <button *ngIf="isAdmin()" class="btn btn-primary" routerLink="/admin/product/new">Add New Product</button>
  </div>
  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let product of products">
      <div class="card h-100 shadow-sm">
        <img [src]="product.image" class="card-img-top" alt="product image" style="height: 200px; object-fit: cover;">
        <div class="card-body">
          <h5 class="card-title">{{ product.name }}</h5>
          <p class="card-text text-muted">{{ product.description }}</p>
          <div class="d-flex justify-content-between align-items-center">
            <h6 class="text-primary mb-0">{{ product.price | currency }}</h6>
            <small class="text-muted">Stock: {{ product.available_quantity }}</small>
          </div>
          <div class="mt-3 d-grid gap-2">
            <ng-container *ngIf="!isAdmin()">
              <button *ngIf="!isInCart(product.id)" class="btn btn-outline-success" (click)="addToCart(product)">Add to Cart</button>
              <button *ngIf="isInCart(product.id)" class="btn btn-success" routerLink="/cart">View in Cart</button>
            </ng-container>
            <div *ngIf="isAdmin()" class="btn-group">
              <button class="btn btn-sm btn-outline-warning" [routerLink]="['/admin/product/edit', product.id]">Edit</button>
              <button class="btn btn-sm btn-outline-danger" (click)="deleteProduct(product.id)">Delete</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
