<nav class="navbar navbar-expand-lg navbar-light bg-white mb-4 shadow-sm">
  <div class="container">
    <a class="navbar-brand" routerLink="/">E-Shop</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/products" routerLinkActive="active">Products</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/about" routerLinkActive="active">About</a>
        </li>
        <li class="nav-item" *ngIf="currentUser?.role === 'admin'">
          <a class="nav-link" routerLink="/admin/categories" routerLinkActive="active">Categories</a>
        </li>
        <li class="nav-item" *ngIf="currentUser && currentUser.role !== 'admin'">
          <a class="nav-link" routerLink="/cart" routerLinkActive="active">Cart</a>
        </li>
      </ul>
      <ul class="navbar-nav">
        <ng-container *ngIf="!currentUser; else loggedIn">
          <li class="nav-item">
            <a class="nav-link" routerLink="/login" routerLinkActive="active">Login</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" routerLink="/signup" routerLinkActive="active">Signup</a>
          </li>
        </ng-container>
        <ng-template #loggedIn>
          <li class="nav-item">
            <span class="nav-link text-dark">Hello, {{ currentUser?.name }}</span>
          </li>
          <li class="nav-item">
            <a class="nav-link" style="cursor: pointer" (click)="logout()">Logout</a>
          </li>
        </ng-template>
      </ul>
    </div>
  </div>
</nav>
